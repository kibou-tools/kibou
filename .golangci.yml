version: "2"

linters:
  enable:
    - bodyclose
    - depguard
    - errcheck
    - exhaustive
    - exhaustruct
    - exptostd
    - forbidigo
    - gochecksumtype
    - importas
    - ineffassign
    - musttag
    # TODO: Let's create our own version of paralleltest which understands
    # Harness.Parallel instead of literally looking for t.Parallel.
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      # base/core and base/check/prelude are designed for dot-import usage.
      - linters: [staticcheck]
        text: "ST1001"
        source: 'base/core|base/check/prelude|base/unit|base/zero'
      - linters: [forbidigo]
        path: ^base/core/pathx/pathx.go$
        source: 'os\.(MkdirAll|MkdirTemp)'
    # Upstream projects are excluded; linting only applies to our code.
    # SYNC(id: linter-exclusions)
    paths:
      - ^go/
      - ^tools/
      - ^delve/
  settings:
    depguard:
      rules:
        # "Main" is the rule name; depguard requires at least one named rule.
        Main:
          list-mode: lax
          deny:
            - pkg: "errors"
              desc: "use base/errorx instead of stdlib errors"
            - pkg: "github.com/cockroachdb/errors"
              desc: "use base/errorx instead of cockroachdb/errors directly"
            - pkg: "log"
              desc: "use base/logx instead of stdlib log"
            - pkg: "log/slog"
              desc: "use base/logx instead of log/slog"
            - pkg: "github.com/charmbracelet/log"
              desc: "use base/logx instead of charmbracelet/log directly"
            - pkg: "github.com/spf13/afero"
              desc: "use base/fsx instead of spf13/afero directly"
        NoDirectOsExec:
          files:
            - $all
            - "!**/base/syscaps/*.go"
            - "!**/base/envx/envx_path/*.go"
          list-mode: lax
          deny:
            - pkg: "os/exec$"
              desc: "use cmdx abstractions instead of os/exec directly; only base/syscaps and base/envx/envx_path are allowed to import it"
        NoStdlibTime:
          files:
            - $all
            - "!**/base/timex/*.go"
            - "!**/base/syscaps/*.go"
            # FIXME: Remove the line below after adding the necessary
            # functionality in timex
            - "!**/misc/cmd/jsonl/*_test.go"
          list-mode: lax
          deny:
            - pkg: "time"
              desc: "use base/time instead"
        NoStdlibContext:
          files:
            - $all
            - "!**/base/cancel/*.go"
            - "!**/base/cancel_bridge/*.go"
            - "!**/cmd/**/main.go"
          list-mode: lax
          deny:
            - pkg: "context"
              desc: "use base/cancel.Token instead of context.Context; only base/cancel, base/cancel_bridge, and cli main.go files may import context"
        NoDirectSyscaps:
          files:
            - $all
            - "!**/main.go"
            # depguard special syntax: $test matches all *_test.go files.
            # See https://golangci-lint.run/docs/linters/configuration/#depguard
            - "!$test"
            - "!**/*_testkit/*.go"
          list-mode: lax
          deny:
            - pkg: "code.kibou.tools/base/syscaps$"
              desc: "ambient system capabilities should only be accessed via base/syscaps at program edges or in tests"
        NoBaseCoreInsideBase:
          files:
            - "base/**/*.go"
          list-mode: lax
          deny:
            - pkg: "code.kibou.tools/base/core$"
              desc: "base/core is an aggregate convenience package for other modules; code under base/ should import smaller base/core/* packages directly"
        NoDirectRivoUniseg:
          files:
            - $all
            - "!**/base/internal/uniseg/*.go"
          list-mode: lax
          deny:
            - pkg: "github.com/rivo/uniseg$"
              desc: "use base/internal/uniseg instead of importing rivo/uniseg directly"
        NoStdlibUTF8:
          files:
            - "base/**/*.go"
            - "misc/**/*.go"
            - "!**/base/utf8/*.go"
          list-mode: lax
          deny:
            - pkg: "unicode/utf8$"
              desc: "use base/utf8 instead of unicode/utf8 directly"
    importas:
      no-unaliased: true
      alias:
        - pkg: code.kibou.tools/base/(core|check/prelude|unit|zero)
          alias: .
    exhaustruct:
      # NOTE: Even with allow-empty-returns: false, exhaustruct unconditionally
      # allows empty structs in error return statements (i.e. `return T{}, err`
      # where err implements error). This is hardcoded with no toggle:
      # https://github.com/GaijinEntertainment/go-exhaustruct/blob/237ddb3/analyzer/analyzer.go#L109-L112
      exclude:
        - ^github\.com/urfave/cli/v3\.(Command|FlagBase|StringFlag|BoolFlag)$
    forbidigo:
      analyze-types: true
      forbid:
        - pattern: ^fmt\.Errorf$
          msg: use base/errorx instead of fmt.Errorf
        - pattern: ^errors\.New$
          msg: use base/errorx instead of errors.New
        - pattern: ^fmt\.Print(f|ln)?$
          msg: use base/logx instead of fmt.Print*
        - pattern: ^log\.Print(f|ln)?$
          msg: use base/logx instead of log.Print*
        - pattern: ^time\.AfterFunc$
          msg: use timex.Scheduler instead of time.AfterFunc
        - pattern: ^print(ln)?$
          msg: do not use builtin print/println
        - pattern: ^testing\.T\.Errorf$
          msg: use base/check Harness assertions instead of t.Errorf
        - pattern: ^testing\.T\.Fatalf$
          msg: use base/check Harness assertions instead of t.Fatalf
        - pattern: ^testing\.T\.Run$
          msg: use Harness.Run instead of t.Run
        - pattern: ^testing\.T\.Parallel$
          msg: use Harness.Parallel instead of t.Parallel
        - pattern: ^os\.IsNotExist$
          msg: use errorx.GetRootCauseAsValue instead of os.IsNotExist
        - pattern: ^os\.MkdirAll$
          msg: use AbsPath.MkdirAll instead of os.MkdirAll
        - pattern: ^os\.MkdirTemp$
          msg: use AbsPath.MkdirTemp instead of os.MkdirTemp
        - pattern: ^slices\.Values$
          msg: use iterx.FromSlice instead of slices.Values
        - pattern: ^slices\.Collect$
          msg: use iterx.Collect instead of slices.Collect
        - pattern: ^pgregory\.net/rapid\.T\.(Errorf|Error|Fatalf|Fatal|FailNow|Fail)$
          msg: use check.NewBasic(t) instead of calling rapid.T methods directly
        - pattern: ^core\.Unimplementedf$
          msg: Unimplementedf is for local development only; do not merge code with unimplemented paths
        - pattern: ^reflect\.DeepEqual$
          msg: use check.AssertSame instead of reflect.DeepEqual in tests
